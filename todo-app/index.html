<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>📝 My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="app-wrapper">
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn" title="Add task (or press Enter)">
                        <span class="btn-icon">➕</span>
                        Add
                    </button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>

            <!-- To-Do List Section -->
            <div class="todos-section">
                <ul id="todoList" class="todo-list">
                    <!-- Todo items will be inserted here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p class="empty-icon">📭</p>
                    <p class="empty-text">No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <!-- Action Buttons Section -->
            <div class="action-buttons">
                <button id="clearCompleted" class="action-btn clear-btn" title="Delete all completed tasks">
                    🗑️ Clear Completed
                </button>
                <button id="clearAll" class="action-btn danger-btn" title="Delete all tasks">
                    ⚠️ Clear All
                </button>
                <button id="exportBtn" class="action-btn export-btn" title="Export tasks as JSON">
                    💾 Export
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>⚠️ Confirm Delete</h2>
            <p id="deleteMessage">Are you sure you want to delete this task?</p>
            <div class="modal-buttons">
                <button id="confirmDelete" class="btn-danger">Delete</button>
                <button id="cancelDelete" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
